name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
      
      - name: Generate documentation
        run: |
          # Create a simple HTML documentation page
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>OpenClaw Email Channel Plugin</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
                  header { text-align: center; margin-bottom: 40px; }
                  h1 { color: #333; }
                  .badges { margin: 20px 0; }
                  .badge { display: inline-block; background: #f0f0f0; padding: 5px 10px; border-radius: 3px; margin: 0 5px 5px 0; font-size: 14px; }
                  .section { margin: 30px 0; }
                  code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-family: 'Courier New', monospace; }
                  pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow: auto; }
                  .links a { display: inline-block; margin: 0 10px 10px 0; padding: 10px 15px; background: #0366d6; color: white; text-decoration: none; border-radius: 5px; }
              </style>
          </head>
          <body>
              <header>
                  <h1>📧 OpenClaw Email Channel Plugin</h1>
                  <p>Email channel plugin for OpenClaw - Send and receive emails as a communication channel</p>
                  <div class="badges">
                      <span class="badge">OpenClaw</span>
                      <span class="badge">Email</span>
                      <span class="badge">Channel</span>
                      <span class="badge">Plugin</span>
                      <span class="badge">IMAP</span>
                      <span class="badge">SMTP</span>
                  </div>
              </header>
              
              <div class="section">
                  <h2>📖 About</h2>
                  <p>This plugin enables OpenClaw to send and receive emails as a communication channel, similar to Telegram or Discord channels.</p>
              </div>
              
              <div class="section">
                  <h2>🚀 Quick Start</h2>
                  <pre><code>npm install
cp .env.example .env
# Edit .env with your email credentials
node test-email.js</code></pre>
              </div>
              
              <div class="section">
                  <h2>🔗 Links</h2>
                  <div class="links">
                      <a href="https://github.com/aibot505/openclaw-email-channel">GitHub Repository</a>
                      <a href="https://github.com/aibot505/openclaw-email-channel/releases">Releases</a>
                      <a href="https://github.com/aibot505/openclaw-email-channel/issues">Issues</a>
                      <a href="https://github.com/aibot505/openclaw-email-channel/blob/master/README.md">Documentation</a>
                  </div>
              </div>
              
              <div class="section">
                  <h2>📄 License</h2>
                  <p>MIT License - See <a href="https://github.com/aibot505/openclaw-email-channel/blob/master/LICENSE">LICENSE</a> file for details.</p>
              </div>
              
              <footer style="margin-top: 50px; text-align: center; color: #666; font-size: 14px;">
                  <p>Generated by GitHub Pages | Repository: <a href="https://github.com/aibot505/openclaw-email-channel">aibot505/openclaw-email-channel</a></p>
              </footer>
          </body>
          </html>
          EOF
          
          # Also copy README as markdown
          cp README.md _site/README.md
          cp SKILL.md _site/SKILL.md
          cp QUICKSTART.md _site/QUICKSTART.md
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2