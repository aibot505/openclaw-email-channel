name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run lint check
      run: npm run lint
    
    - name: Check syntax
      run: |
        node -c email-channel-plugin.js
        node -c test-email.js
        node -c openclaw-integration-example.js
        node -c test/unit.test.js
        node -c test/run-tests.js
    
    - name: Verify Node.js version compatibility
      run: |
        echo "Testing with Node.js $(node --version)"
        echo "Testing ECMAScript compatibility..."
    
    - name: Run unit tests
      run: npm test
    
    - name: Check package.json
      run: |
        npm pack --dry-run
        npm outdated || true